<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Sophie Bluel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Work+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" >

<body>
<header>
    <h1>Sophie Bluel <span>Architecte d'intérieur</span></h1>
    <nav>
        <ul>
            <li data-text="projets"><a href="index.html">projets</a></li>
            <li data-text="contact">contact</li>
            <li class="nav-active" data-text="login">login</li>
            <li><img src="./assets/icons/instagram.png" alt="Instagram"></li>
        </ul>
    </nav>
</header>
<main>
    <form>
        <h2>Log in</h2>
        <div>
            <label for="email">Email</label> <br>
            <input type="email" id="email" name="email">
        </div>
        <div>
            <label for="password">Mot de passe</label> <br>
            <input type="password" id="password" name="password">
        </div>
        <button id="btn-login">Se connecter</button>
        <p id="error-message"></p>
        <a class="mdp-oublie" href="">Mot de passe oublié</a>
    </form>
</main>
<footer>
    <nav>
        <ul>
            <li>Mentions Légales</li>
        </ul>
    </nav>
</footer>
<script src="./assets/JS/script.js"></script>
</body>

</html>
